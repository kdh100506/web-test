특정 부분을 숨겼다가 보여주는 기능은 웹 UI에서 가장 많이 쓰이는 패턴 중 하나입니다. 주로 CSS의 display 속성을 자바스크립트로 조작하여 구현합니다.

아래는 버튼을 누를 때마다 특정 박스가 나타났다 사라졌다 하는(Toggle) 예제입니다.

1. HTML/JS 전체 코드
HTML
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>블라인드 토글 기능</title>
    <style>
        /* 숨겨질 박스 스타일 */
        #blindContent {
            width: 300px;
            padding: 20px;
            margin-top: 10px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 8px;
            /* 처음에는 숨겨둠 */
            display: none; 
        }

        .btn {
            padding: 8px 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h3>상세 내용 확인하기</h3>
    
    <button class="btn" onclick="toggleBlind()">내용 보기/숨기기</button>

    <div id="blindContent">
        <p>짜잔! 숨겨져 있던 비밀 내용입니다. 🤫</p>
        <p>자바스크립트의 display 속성을 이용해 구현했습니다.</p>
    </div>

    <script>
        function toggleBlind() {
            // 1. 숨겨진 요소를 가져옵니다.
            const content = document.getElementById('blindContent');

            // 2. 현재 상태가 'none'(숨김)인지 확인합니다.
            if (content.style.display === 'none' || content.style.display === '') {
                // 3. 숨겨져 있다면 보이게 변경 ('block')
                content.style.display = 'block';
            } else {
                // 4. 보이고 있다면 다시 숨기기 ('none')
                content.style.display = 'none';
            }
        }
    </script>

</body>
</html>
