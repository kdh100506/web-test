<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>공간</h2>
    <p style="background-color: yellow; width: 200px; height: 200px; margin-bottom: 30px; margin-top: 50px; margin-left: 40px;">box1</p>
    <p style="background-color: pink; width: 200px; height: 200px; margin: 50px 40px 30px 20px;">box2</p>
    <p style="background-color: red; width: 200px; height: 200px; margin: 50px 0 20px 40px;">box2</p>
    <p style="background-color: blue; width: 200px; height: 200px; padding: 50px 0 20px;">box2</p>

    <h2>box-sizing</h2>
    <p style="background-color: green; width: 200px; height: 100px; padding: 30px; box-sizing: border-box ;">box-sizing</p>
    <p style="background-color: purple; width: 200px; height: 100px; padding: 30px; ">box-sizing</p>

    <h2>border-radius:둥근 사각형</h2>
    <p class="box3">box3</p>
    <p class="box4"><img src="../HTML연습/img/IMG_0314.JPG"></p>
    <style>
        .box3{background-color: skyblue; width: 300px; height: 300px; border-radius: 50% 0 50% 50%;}
        .box4{background-color: hotpink; width: 300px; height: 300px; border-radius: 50%; overflow: hidden;}
    </style>
</body>
</html>
