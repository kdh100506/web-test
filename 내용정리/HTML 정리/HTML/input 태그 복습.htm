<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>텍스트 입력 <input type="text"></p>
    <p>비밀번호 입력 <input type="password"></p> <!--텍스트를 치면 글자가 보이지 않고 점으로 표현됨-->
    <p>선택형 <input type="radio" name="test"> A<input type="radio" name="test"> B</p> <!--name="___"같으면 중복선택이 불가능-->
    <p>체크박스 <input type="checkbox"> A<input type="checkbox"> b</p>
    <p>버튼 <input type="button" value="A"></p> <!--value="___"에 값을 넣으면 그 값이 버특에 텍스트로 기입됨-->
    <p>
        <select>
            <option>다운드롭</option>
            <option>A</option>
            <option>B</option>
        </select>
    </p>
    <p><textarea>장문형</textarea></p>
    <p><label for="A">라벨 </label> <input type="text" id="A"></p> <!--label for="___"과 id="___"-->
    <form> <!--폼을 묶을때 사용-->
        <fieldset> <!--폼을 묶을때 사용-->
            <legend>묶음의 제목</legend>
        </fieldset>
    </form>
</body>
</html>
