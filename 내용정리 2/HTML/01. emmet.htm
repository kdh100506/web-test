<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!--자식노드-->
    <!--예시: div>ul>li-->
    <div>
      <ul>
        <li></li>
      </ul>
    </div>

    <!--형제노드-->
    <!--예시: div>ul+ol+div-->
    <div>
      <ul></ul>
      <ol></ol>
      <div></div>
    </div>

    <!--반복하기-->
    <!--예시: div>ul>li*3-->
    <div>
      <ul>
        <li></li>
        <li></li>
        <li></li>
      </ul>
    </div>

    <!--아이디 #-->
    <!--예시: span#item-->
    <span id="item"></span>
    <!--예시: #item-->
    <div id="item"></div>

    <!--클래스 .-->
    <!--예시: span.title-->
    <span class="title"></span>
    <!--예시: .title-->
    <div class="title"></div>
  </body>
</html>
