<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>멀티미디어 태그 예시</title>
  </head>
  <body>
    <h2>이미지 삽입</h2>
    <img src="../IMG/img.jpg" alt="풍경 사진" width="200" />
    <hr />

    <h2>오디오 재생</h2>
    <audio src="../IMG/audio.wav" controls preload="metadata"></audio>
    <hr />

    <h2>비디오 재생</h2>
    <video
      src="../IMG/video.mp4"
      width="400"
      controls
      autoplay
      muted
      loop
      preload="auto"
      poster="../IMG/img.jpg"
    >
      브라우저가 비디오를 지원하지 않습니다.
    </video>
  </body>
</html>
