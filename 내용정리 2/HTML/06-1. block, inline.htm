<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!--Block 레벨 요소-->
    <!--부모 요소의 전체 공간을 블록으로 만듬-->
    <!--한칸을 전부 차지함-->
    <!--width, height, margin이 적용됨-->
    <h1></h1>
    <h2></h2>
    <h3></h3>
    <h4></h4>
    <h5></h5>
    <h6></h6>
    <ol></ol>
    <ul></ul>
    <li></li>
    <p></p>
    <div></div>

    <!--Inline 레벨 요소-->
    <!--콘텐츠의 흐름을 끊지 않고 태그에 할당된 공간만 차지-->
    <!--margin-top, margin-bottom이 적용 안됨 대신 line-height-->
    <!--width, height 적용 안됨-->
    <!--text-align 적용 안됨-->
    <a></a>
    <em></em>
    <img />
    <span></span>
  </body>
</html>
