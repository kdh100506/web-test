<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <img src="../IMG/img.jpg" alt="사진" width="200" />
    <!--img태그는 이미지 삽입-->
    <!--src속성은 이미지 경로 지정-->
    <!--alt속성은 이미지의 대체 텍스트-->

    <audio src="../IMG/audio.wav" controls></audio>
    <video src="../IMG/video.mp4" controls></video>
    <!--audio태그는 음성 삽입-->
    <!--vidio태그는 영상 삽입-->
    <!--controls는 컨브롤 바 생성-->
    <!--autopaly는 자동 실행(크롬,파이어폭스는 muted를 해야 자동재생 됨)-->
    <!--loop는 반복 실행 -->
    <!--preload는 파일을 어떻게 로딩할건지 선택(auto,, metadata, none중 하나 기본은 auto)-->
    <!--poster는 비디오가 재생되기전 화면에 표시될 포스터 이미지를 저장함-->
  </body> 
</html>
