<!doctype html>
<html lang="kr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        text-align: center;
      }
      .header {
        border: 2px solid red;
        line-height: 55px;
        height: 55px;
      }
      .nav {
        border: 2px solid blue;
        height: 110px;
      }
      .main {
        border: 2px solid green;
        height: 300px;
        line-height: 300px;
      }
      .footer {
        border: 2px solid black;
        height: 55px;
        line-height: 55px;
      }
      ul {
        list-style: none;
        padding-left: 0px;
      }
    </style>
  </head>
    <header></header>
    <!--페이지에 대한 정보를 담음, 페이지 상단에 위치-->
    <nav></nav>
    <!--다른 페이지 또는 같은 페이지 안에 다른 부분을 이어주는 네비게이션으로 구성된 섹션-->
    <aside></aside>
    <!--페이지 전체와 어느정도 관련성이 있지만 주요내용과는 직접적인 연관성은 없는 분리된 내용-->
    <main></main>
    <!--문서의 body요소의 주 콘텐츠-->
    <section></section>
    <!--문서나 응용프로그램의 일반적인 섹션-->
    <article></article>
    <!--사이트에서 완전하거나 독립적으로 구분되는 구성-->
    <footer></footer>
    <!--저작권 보호나 서비스 제공자 등을 나타냄, 페이지 하단에 위치-->
    <details></details>
    <!--추가적인 정보를 나타내거나 사용자가 요청하는 정보를 나타냄-->
    <summary></summary>
    <!--부모 요소인 details요소의 내용들에 대한 요약이나 캡션을 나타냄-->
    <figcaption></figcaption>
    <!--부모요소인 figure요소의 대한 캡션이나 제목을 나타냄-->
    <figure></figure>
    <!--일러스트, 다이어그램, 사진, 코드등에 주석을 다는 용도-->
    <mark></mark>
    <!--다른 문맥과의 관련성을 나타내기 위해 참조 목적으로 마킹되거나 하이라이트된 텍스트-->
    <time></time>
    <!--24시간에서의 정밀한 시간 혹은 그레고리력에서의 정밀한 날자를 나타냄-->

    <div class="header">Header 영역</div>
    <div class="nav">
      <ul>
        <li>Menu1</li>
        <li>Menu2</li>
        <li>Menu3</li>
        <li>Menu4</li>
      </ul>
    </div>
    <div class="main">Content 영역</div>
    <div class="footer">Footer 영역</div>
  </body>
</html>
